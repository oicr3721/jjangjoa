<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>머먹 — 오늘 뭐 먹지?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey={{ kakao_js_key }}"></script>
</head>
<body>

<!-- ===== 태그 선택 화면 ===== -->
<div id="screen-tags" class="screen active">
  <div class="screen-inner">

    <div class="hero">
      <div class="hero-icon">🍽️</div>
      <h1 class="hero-title">머먹</h1>
      <p class="hero-sub">오늘 뭐 먹을지 고민될 때</p>
      <div id="locationStatus" class="location-status">
        <span class="location-dot"></span>
        <span id="locationText">위치 파악 중…</span>
      </div>
    </div>

    <!-- 자유 입력창 -->
    <div class="free-text-section">
      <div class="free-text-wrap">
        <span class="free-text-icon">✏️</span>
        <input
          id="freeTextInput"
          class="free-text-input"
          type="text"
          placeholder="직접 입력 (예: 아이들이 좋아하는 음식, 해장하고 싶어요…)"
          maxlength="80"
        >
      </div>
      <p class="free-text-hint">또는 아래 태그를 선택해도 돼요</p>
    </div>

    <!-- 태그 그룹 -->
    <div class="tags-section">
      <p class="tags-hint">원하는 조건을 선택하세요 <span class="tags-hint-sub">(복수 선택 가능)</span></p>
      <div id="tagGrid" class="tag-grid"></div>
    </div>

    <!-- 선택된 태그 -->
    <div id="selectedBar" class="selected-bar hidden">
      <div class="selected-bar-inner">
        <span class="selected-label">선택</span>
        <div id="selectedChips" class="selected-chips"></div>
        <button class="clear-btn" onclick="clearAll()">전체 해제</button>
      </div>
    </div>

    <!-- 하단 액션 -->
    <div class="action-area">
      <div class="preset-row">
        <button class="preset-toggle-btn" onclick="togglePresetPanel()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          프리셋
        </button>
        <button class="save-preset-btn" onclick="saveCurrentAsPreset()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          현재 조건 저장
        </button>
      </div>

      <div id="presetPanel" class="preset-panel hidden">
        <p class="preset-panel-title">저장된 프리셋</p>
        <div id="presetList" class="preset-list"></div>
        <p class="preset-empty hidden" id="presetEmpty">저장된 프리셋이 없어요</p>
      </div>

      <button class="search-btn" onclick="startSearch()">
        오늘 여기서 먹자
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>

  </div>
</div>

<!-- ===== 결과 화면 ===== -->
<div id="screen-results" class="screen">

  <div class="result-header">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      다시 선택
    </button>
    <span class="result-brand">머먹</span>
    <div class="result-header-right">
      <span id="resultCount" class="result-count"></span>
      <button class="refresh-location-btn" onclick="refreshLocation()" title="위치 새로고침">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
  </div>

  <!-- 지도 -->
  <div id="map" class="map-area"></div>

  <!-- 키워드 필터 바 -->
  <div id="keywordFilterBar" class="keyword-filter-bar hidden"></div>

  <!-- 로딩 -->
  <div id="loadingOverlay" class="loading-overlay hidden">
    <div class="loading-spinner"></div>
    <p class="loading-text">AI가 맛집을 찾고 있어요…</p>
  </div>

  <!-- 결과 리스트 -->
  <div id="results" class="results-list"></div>

</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/location.js"></script>
<script src="/static/js/map.js"></script>
<script src="/static/js/conditions.js"></script>
<script src="/static/js/presets.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
