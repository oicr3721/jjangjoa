<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Food Finder Client</title>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=6f3fddef9154777af7c6801d467d5913"></script> <!--6f~13 까지가 카카오 Javascript 키인데 일단 제가 발급한 키 넣었으니 마음껏 사용하세요-->
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .restaurant-card { border: 1px solid #ccc; padding: 10px; margin: 5px; }
    #map { width: 100%; height: 400px; margin-top: 10px; display: none; }
    .preset-btn { margin: 3px; padding: 5px 10px; border: 1px solid #888; cursor: pointer; }
    .preset-container { display: inline-flex; align-items: center; margin: 3px; }
    .delete-btn { margin-left: 5px; color: red; cursor: pointer; }
    #presetArea, #tagArea { display: none; }
    #togglePreset.active, #toggleTags.active { background-color: #4CAF50; color: white; }
    #togglePreset.inactive, #toggleTags.inactive { background-color: #ccc; color: black; }
    #currentConditions { margin-top: 10px; }
    .condition-tag { display: inline-flex; align-items: center; margin: 3px; padding: 5px; border: 1px solid #aaa; background: #eee; }
    .condition-tag .delete-btn { margin-left: 5px; color: red; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Food Finder</h1>
  <label>조건 (쉼표로 구분): 
    <input type="text" id="conditions" value="든든한, 혼밥 가능" oninput="updateConditionTags()">
  </label>
  <button onclick="registerCondition()">등록</button>
  <button id="togglePreset" class="inactive" onclick="togglePresets()">프리셋</button>
  <button id="toggleTags" class="inactive" onclick="toggleTags()">태그</button>
  <div id="presetArea"></div>
  <div id="tagArea"></div>
  <div id="currentConditions"></div>
  <br>
  <label>위도: <input type="text" id="latitude" value="37.5665"></label><br>
  <label>경도: <input type="text" id="longitude" value="126.9780"></label><br>
  <button onclick="sendRequest()">추천 요청</button>
  <button onclick="showMap()">지도 보기</button>

  <div id="map"></div>
  <div id="results"></div>

  <script>
    let restaurantsData = []; 
    let presets = [];         
    let presetVisible = false;
    let tagsVisible = false;
    let tagsData = [];

    window.onload = function() {
      const saved = localStorage.getItem("presets");
      if (saved) {
        presets = JSON.parse(saved);
      }
      updateConditionTags();
    };

    function registerCondition() {
      const condText = document.getElementById("conditions").value.trim();
      if (condText && !presets.includes(condText)) {
        presets.push(condText);
        localStorage.setItem("presets", JSON.stringify(presets));
        alert("조건이 등록되었습니다: " + condText);
      }
    }

    function togglePresets() {
      const presetArea = document.getElementById("presetArea");
      const toggleBtn = document.getElementById("togglePreset");

      presetVisible = !presetVisible;
      if (presetVisible) {
        showPresets();
        presetArea.style.display = "block";
        toggleBtn.classList.remove("inactive");
        toggleBtn.classList.add("active");
      } else {
        presetArea.style.display = "none";
        toggleBtn.classList.remove("active");
        toggleBtn.classList.add("inactive");
      }
    }

    function showPresets() {
      const presetArea = document.getElementById("presetArea");
      presetArea.innerHTML = "<h3>저장된 조건 프리셋</h3>";
      presets.forEach((p, index) => {
        const container = document.createElement("div");
        container.className = "preset-container";

        const btn = document.createElement("button");
        btn.className = "preset-btn";
        btn.innerText = p;
        btn.onclick = () => addCondition(p);

        const del = document.createElement("span");
        del.className = "delete-btn";
        del.innerText = "✕";
        del.onclick = () => {
          presets.splice(index, 1);
          localStorage.setItem("presets", JSON.stringify(presets));
          showPresets();
        };

        container.appendChild(btn);
        container.appendChild(del);
        presetArea.appendChild(container);
      });
    }

    function toggleTags() {
      const tagArea = document.getElementById("tagArea");
      const toggleBtn = document.getElementById("toggleTags");

      tagsVisible = !tagsVisible;
      if (tagsVisible) {
        fetch("http://127.0.0.1:8000/conditions")
          .then(res => res.json())
          .then(data => {
            tagsData = data.conditions;
            showTags();
            tagArea.style.display = "block";
            toggleBtn.classList.remove("inactive");
            toggleBtn.classList.add("active");
          });
      } else {
        tagArea.style.display = "none";
        toggleBtn.classList.remove("active");
        toggleBtn.classList.add("inactive");
      }
    }

    function showTags() {
      const tagArea = document.getElementById("tagArea");
      tagArea.innerHTML = "<h3>원래 조건 태그</h3>";
      tagsData.forEach(tag => {
        const btn = document.createElement("button");
        btn.className = "preset-btn";
        btn.innerText = tag;
        btn.onclick = () => addCondition(tag);
        tagArea.appendChild(btn);
      });
    }

    // 현재 입력창 조건 업데이트
    function updateConditionTags() {
      const inputVal = document.getElementById("conditions").value;
      const conditionsArr = inputVal.split(",").map(c => c.trim()).filter(c => c !== "");
      const currentDiv = document.getElementById("currentConditions");
      currentDiv.innerHTML = "<h3>현재 조건</h3>";
      conditionsArr.forEach((cond, index) => {
        const tag = document.createElement("div");
        tag.className = "condition-tag";
        tag.innerText = cond;

        const del = document.createElement("span");
        del.className = "delete-btn";
        del.innerText = "✕";
        del.onclick = () => {
          conditionsArr.splice(index, 1);
          document.getElementById("conditions").value = conditionsArr.join(", ");
          updateConditionTags();
        };

        tag.appendChild(del);
        currentDiv.appendChild(tag);
      });
    }

    // 조건 중첩 추가 (중복 방지)
    function addCondition(newCond) {
      const inputVal = document.getElementById("conditions").value;
      let conditionsArr = inputVal.split(",").map(c => c.trim()).filter(c => c !== "");
      if (!conditionsArr.includes(newCond)) {
        conditionsArr.push(newCond);
        document.getElementById("conditions").value = conditionsArr.join(", ");
        updateConditionTags();
      }
    }

    function sendRequest() {
      const conditions = document.getElementById("conditions").value.split(",").map(c => c.trim()).filter(c => c !== "");
      const lat = parseFloat(document.getElementById("latitude").value);
      const lng = parseFloat(document.getElementById("longitude").value);

      fetch("http://127.0.0.1:8000/recommend", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          conditions: conditions,
          latitude: lat,
          longitude: lng
        })
      })
      .then(res => res.json())
      .then(data => {
        restaurantsData = data.restaurants;
        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = "<h2>추천 결과 (final_restaurants)</h2>";
        restaurantsData.forEach(r => {
          resultsDiv.innerHTML += `
            <div class="restaurant-card">
              <h3>${r.name}</h3>
              <p>${r.address}</p>
              <p>점수: ${r.score}</p>
              <p>키워드: ${r.matched_keywords.join(", ")}</p>
            </div>`;
        });
      })
      .catch(err => {
        document.getElementById("results").innerHTML = "에러 발생: " + err;
      });
    }

    function showMap() {
      if (restaurantsData.length === 0) {
        alert("먼저 추천 요청을 해주세요!");
        return;
      }

      const lat = parseFloat(document.getElementById("latitude").value);
      const lng = parseFloat(document.getElementById("longitude").value);

      const mapContainer = document.getElementById('map');
      mapContainer.style.display = "block";
      const mapOption = { center: new kakao.maps.LatLng(lat, lng), level: 3 };
      const map = new kakao.maps.Map(mapContainer, mapOption);

      const userMarker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(lat, lng) });
      userMarker.setMap(map);

      restaurantsData.forEach(r => {
        const marker = new kakao.maps.Marker({
          position: new kakao.maps.LatLng(r.latitude, r.longitude)
        });
        marker.setMap(map);

        const infowindow = new kakao.maps.InfoWindow({
          content: `<div style="padding:5px;">${r.name}<br/>점수: ${r.score}</div>`
        });

        kakao.maps.event.addListener(marker, 'click', function() {
          infowindow.open(map, marker);
        });
      });
    }
  </script>
</body>
</html>
